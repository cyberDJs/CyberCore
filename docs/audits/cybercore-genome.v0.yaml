root_causes:
  - id: rc.long_lived_branches
    severity: critical
    description: Major capabilities evolved on long-lived branches without regular reintegration.
  - id: rc.shared_integration_surfaces
    severity: high
    description: Multiple branches independently modify cli.py and pyproject.toml.
  - id: rc.unclear_kernel
    severity: high
    description: Runtime, CXP, Knowledge, Provider and Demo were not explicitly classified as kernel versus modules.
  - id: rc.multiple_sources_of_truth
    severity: high
    description: Architecture and project state are duplicated across root docs, foundation docs, ADRs, specifications and work blocks.
  - id: rc.chat_as_coordination_layer
    severity: high
    description: Significant decisions depended on transient chat context rather than mandatory repository checkpoints.
  - id: rc.unclosed_superseded_work
    severity: medium
    description: Old PRs and issues remain open without disposition, creating ambiguity.

consolidation_sequence:
  - step: 1
    action: complete_architecture_and_capability_audit
  - step: 2
    action: merge_low_risk_pr18_after_compatibility_confirmation
  - step: 3
    action: create_clean_integration_branch_from_updated_main
  - step: 4
    action: selectively_port_pr13_by_domain_slice_with_tests
  - step: 5
    action: audit_and_salvage_pr5_provider_contract
  - step: 6
    action: define_canonical_dependency_direction
  - step: 7
    action: implement_checkpoint_generation_and_staleness_checks

open_questions:
  - What is the formal CyberCore kernel?
  - Is CXP a transport subsystem or the central runtime contract?
  - Does the registry contain entities directly, or only claims about entities?
  - Is a decision candidate part of the Knowledge domain or Mutation domain?
  - Should providers depend only on Evidence contracts and never on Knowledge internals?
  - Which architecture document supersedes ARCHITECTURE.md and FOUNDATIONS.md?
