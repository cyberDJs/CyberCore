  <path d="M128 76v52l45 26M83 154l45-26" fill="none" stroke="#d7f8ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="128" cy="76" r="12" fill="#16f2d2"/>
  <circle cx="83" cy="154" r="12" fill="#ff4fd8"/>
  <circle cx="173" cy="154" r="12" fill="#5f7cff"/>
  <circle cx="128" cy="128" r="12" fill="#f7fbff"/>
</svg>
