<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">CyberCore mark</title>
  <desc id="desc">A geometric infrastructure control-plane mark with a central core, evidence ring, and connected nodes.</desc>
  <defs>
    <linearGradient id="core-glow" x1="40" y1="38" x2="216" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16f2d2"/>
      <stop offset="0.52" stop-color="#5f7cff"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#07111f" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="32" fill="#07111f"/>
  <path d="M128 28 216 78v100l-88 50-88-50V78z" fill="#0e1b2e" stroke="#25395f" stroke-width="8"/>
  <path d="M128 50 196 89v78l-68 39-68-39V89z" fill="none" stroke="url(#core-glow)" stroke-width="8" stroke-linejoin="round" filter="url(#soft-shadow)"/>
